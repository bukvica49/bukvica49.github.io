   <h2>Напишите нам</h2>
<form id="feedbackForm" method="post">
  <div class="form-group">
    <label for="name">Имя *</label>
    <input type="text" id="name" name="name" required placeholder="Введите ваше имя">
  </div>

  <div class="form-group">
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" required placeholder="Введите ваш email">
  </div>

  <div class="form-group">
    <label for="subject">Тема</label>
    <select id="subject" name="subject">
      <option value="">Выберите тему</option>
      <option value="question">Вопрос по проекту</option>
      <option value="cooperation">Сотрудничество</option>
      <option value="other">Другое</option>
    </select>
  </div>

  <div class="form-group">
    <label for="message">Сообщение *</label>
    <textarea id="message" name="message" required placeholder="Опишите ваш вопрос или предложение..." rows="5"></textarea>
  </div>

  <button type="submit" class="submit-btn">
    <i class="fas fa-paper-plane"></i> Отправить сообщение
  </button>
  <p class="form-note">* — обязательные для заполнения поля</p>
</form>
